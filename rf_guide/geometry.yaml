# geometry.yaml  –  Trap geometry for trapsim.
#
# Edit this file when porting trapsim to a new trap geometry.  Every other
# file in the pipeline reads electrode and dielectric names from here.
#
# Coordinate convention: Fusion world (mm).  The simulation grid is the
# rectangular box defined by `grid.bounds_mm` below; the GEM offset used
# internally by SIMION-compatible PA files is derived as -bounds_mm[*][0].
#
# Each electrode is one independent Laplace solve.  STLs listed under the
# same electrode are wired together (single voltage source).  Electrodes
# are assigned an integer id from 1..N in the order declared below, which
# is the suffix on the output PA file (paulTrap.pa<id>).
#
# `color` is an optional [r, g, b] in 0..1.  `opacity` is optional 0..1.
# Both are used only by trapsim.viz.

grid:
  dx_mm: 0.25
  bounds_mm:
    x: [-25.0,  40.0]
    y: [ -8.0,  37.0]
    z: [-132.0, 295.0]

electrodes:
  - name: rf_loading
    stls:
      - stl/rod_1_TL.stl
      - stl/rod_1_BR.stl
      - stl/rod_2_TL.stl
      - stl/rod_2_BR.stl
    color: [0.85, 0.20, 0.15]   # warm red — +RF
  - name: rf_loading_inv
    stls:
      - stl/rod_1_TR.stl
      - stl/rod_1_BL.stl
      - stl/rod_2_TR.stl
      - stl/rod_2_BL.stl
    color: [0.20, 0.45, 0.80]   # steel blue — −RF
  - name: endcap_load_U
    stls: [stl/endcap_load_U.stl]
    color: [0.15, 0.70, 0.55]
    opacity: 0.55
  - name: endcap_load_D
    stls: [stl/endcap_load_D.stl]
    color: [0.15, 0.70, 0.55]
    opacity: 0.55
  - name: rod_3_TL
    stls: [stl/rod_3_TL.stl]
    color: [1.00, 0.45, 0.20]
  - name: rod_3_TR
    stls: [stl/rod_3_TR.stl]
    color: [1.00, 0.65, 0.20]
  - name: rod_3_BL
    stls: [stl/rod_3_BL.stl]
    color: [0.35, 0.55, 0.85]
  - name: rod_3_BR
    stls: [stl/rod_3_BR.stl]
    color: [0.55, 0.65, 0.85]
  - name: endcap_optical_U
    stls: [stl/endcap_optical_U.stl]
    color: [0.10, 0.55, 0.30]
    opacity: 0.55
  - name: endcap_optical_D
    stls: [stl/endcap_optical_D.stl]
    color: [0.10, 0.55, 0.30]
    opacity: 0.55

dielectrics:
  - name: trapping_lens
    stl: stl/trapping_lens.stl
    epsilon_r: 3.0
    color: [0.50, 0.90, 0.95]
  - name: collection_lens
    stl: stl/collection_lens.stl
    epsilon_r: 3.0
    color: [0.50, 0.90, 0.95]
  - name: lens_holder
    stl: stl/lens_holder.stl
    epsilon_r: 3.0
    color: [0.85, 0.80, 0.65]

# Bodies drawn in visualize.py but with no field contribution.
decoration:
  - name: gate_valve
    stl: stl/gate_valve.stl
    color: [0.5, 0.5, 0.5]
